name: Run 100-Agent Passport Verification

on:
  workflow_dispatch: # Allows manually triggering the 100 verification agents with a single click

permissions:
  contents: write # Allows the workflow to commit and push the generated blueprint

jobs:
  execute-verification-swarm:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Network Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install aiohttp

    - name: Create keys.txt from secret
      env:
        KEYS_SECRET: ${{ secrets.TOKEN_ROUTER_KEYS }}
      run: |
        echo "$KEYS_SECRET" > keys.txt

    - name: Execute Parallel Multi-Agent Swarm
      run: python run_passport_agents.py

    - name: Commit and Push Passport Verification Blueprint
      run: |
        git config --global user.name "Autonomous Swarm Agent"
        git config --global user.email "agent-swarm@github.com"
        git add complete_passport_verification_blueprint.md
        git commit -m "docs: generate flawless 100-agent passport verification blueprint [skip ci]" || echo "No changes to commit"
        git push
